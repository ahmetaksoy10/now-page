name: CI

# Kalite kapısı: her PR'da ve main DIŞINDAKİ dallara push'ta çalışır.
# main'e push deploy.yml'i tetikler (o da build öncesi lint+test koşar) →
# bozuk kod asla yayınlanmaz.
on:
  pull_request:
  push:
    branches-ignore: ['main']

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build
