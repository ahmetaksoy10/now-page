<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Ahmet Aksoy — Şu an hayatımda neler olduğunu anlatan kişisel Now Page: odak noktam, öğrendiklerim, okuduklarım ve aktif projelerim."
    />
    <title>Şu An — Ahmet Aksoy</title>

    <!--
      Tipografi: Inter, modern ürün arayüzlerinin (Linear, Vercel, Stripe) standart fontudur.
      `preconnect` ile font sunucusuna erken bağlantı kurarak ilk boyamayı (FCP) hızlandırıyoruz.
    -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Instrument Serif (italik): başlıklardaki editoryal vurgular için -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400..800&family=JetBrains+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&display=swap"
      rel="stylesheet"
    />

    <!--
      Tema önyükleme (FOUC önleme): React yüklenmeden ÖNCE çalışan bu küçük script,
      kayıtlı temayı (veya sistem tercihini) <html> etiketine işler.
      Böylece koyu temalı bir kullanıcı, sayfa açılırken beyaz bir "flaş" görmez.
    -->
    <script>
      ;(function () {
        try {
          var stored = localStorage.getItem('now-page-theme')
          var theme =
            stored ||
            (window.matchMedia('(prefers-color-scheme: light)').matches
              ? 'light'
              : 'dark')
          document.documentElement.setAttribute('data-theme', theme)
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'dark')
        }
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
